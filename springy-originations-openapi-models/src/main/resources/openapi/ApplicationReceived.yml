openapi: 3.0.3
info:
  title: Auto Loan Application Intake API
  version: 0.1.0

paths:
  /applications/auto-loans:
    post:
      summary: Submit an auto loan application
      operationId: submitAutoLoanApplication
      tags:
        - Auto Loan Applications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutoLoanApplicationRequest"
      responses:
        "202":
          description: Application accepted for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationAcceptedResponse"
        "400":
          description: Invalid application payload
        "409":
          description: Duplicate application submission
        "500":
          description: Internal server error

components:
  schemas:
    AutoLoanApplicationRequest:
      type: object
      required:
        - sourceSystem
        - applicationChannel
        - primaryApplicant
        - loanRequest
        - purchaseVehicle
      properties:
        externalApplicationId:
          type: string
        correlationId:
          type: string
        sourceSystem:
          type: string
        applicationChannel:
          type: string
          enum:
            - REST
            - SOAP
            - DEALER_PORTAL
            - BROKER_PORTAL
            - INTERNAL
        primaryApplicant:
          $ref: "#/components/schemas/ApplicantInformation"
        secondaryApplicant:
          $ref: "#/components/schemas/ApplicantInformation"
        loanRequest:
          $ref: "#/components/schemas/LoanRequestInformation"
        purchaseVehicle:
          $ref: "#/components/schemas/VehicleInformation"
        tradeInVehicle:
          $ref: "#/components/schemas/VehicleInformation"
        dealer:
          $ref: "#/components/schemas/DealerInformation"

    ApplicantInformation:
      type: object
      required:
        - applicantType
        - firstName
        - lastName
        - dateOfBirth
        - employment
        - address
      properties:
        applicantId:
          type: string
        applicantType:
          type: string
          enum:
            - PRIMARY
            - SECONDARY
        firstName:
          type: string
        middleName:
          type: string
        lastName:
          type: string
        suffix:
          type: string
        dateOfBirth:
          type: string
          format: date
        ssnLastFour:
          type: string
          minLength: 4
          maxLength: 4
        emailAddress:
          type: string
          format: email
        phoneNumber:
          type: string
        employment:
          $ref: "#/components/schemas/EmploymentInformation"
        address:
          $ref: "#/components/schemas/AddressInformation"

    EmploymentInformation:
      type: object
      required:
        - employmentStatus
      properties:
        employmentStatus:
          type: string
          enum:
            - EMPLOYED
            - SELF_EMPLOYED
            - RETIRED
            - UNEMPLOYED
            - STUDENT
            - OTHER
        employerName:
          type: string
        jobTitle:
          type: string
        monthlyIncome:
          type: number
          format: double
          minimum: 0
        employmentStartDate:
          type: string
          format: date

    AddressInformation:
      type: object
      required:
        - addressLine1
        - city
        - state
        - postalCode
      properties:
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        state:
          type: string
          minLength: 2
          maxLength: 2
        postalCode:
          type: string
        country:
          type: string
          default: US
        residencyStatus:
          type: string
          enum:
            - OWN
            - RENT
            - LIVE_WITH_FAMILY
            - OTHER
        monthlyHousingPayment:
          type: number
          format: double
          minimum: 0

    LoanRequestInformation:
      type: object
      required:
        - requestedLoanAmount
        - loanPurpose
        - productType
      properties:
        requestedLoanAmount:
          type: number
          format: double
          minimum: 0
        downPaymentAmount:
          type: number
          format: double
          minimum: 0
        requestedTermMonths:
          type: integer
          minimum: 1
        loanPurpose:
          type: string
          enum:
            - PURCHASE
            - REFINANCE
            - LEASE_BUYOUT
        productType:
          type: string
          enum:
            - NEW_AUTO
            - USED_AUTO
            - REFINANCE

    VehicleInformation:
      type: object
      properties:
        vin:
          type: string
          minLength: 17
          maxLength: 17
        year:
          type: integer
          minimum: 1900
        make:
          type: string
        model:
          type: string
        trim:
          type: string
        mileage:
          type: integer
          minimum: 0
        vehicleValue:
          type: number
          format: double
          minimum: 0

    DealerInformation:
      type: object
      properties:
        dealerId:
          type: string
        dealerName:
          type: string
        dealerState:
          type: string
          minLength: 2
          maxLength: 2
        dealerPhoneNumber:
          type: string

    ApplicationAcceptedResponse:
      type: object
      required:
        - applicationId
        - status
      properties:
        applicationId:
          type: string
        externalApplicationId:
          type: string
        correlationId:
          type: string
        status:
          type: string
          example: ACCEPTED